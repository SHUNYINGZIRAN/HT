<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>云间小阁 - 通知中心</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@400;700&display=swap"
        rel="stylesheet">
    <style>
        /* ===== 全局重置（与后台系统一致） ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* 隐藏滚动条，保持可滚动 */
        html {
            scrollbar-width: none;
            -ms-overflow-style: none;
        }

        html::-webkit-scrollbar {
            display: none;
        }

        body {
            font-family: 'Noto Serif SC', serif;
            background-color: #f8f4e9;
            color: #5c4c3e;
            line-height: 1.6;
            background-image:
                radial-gradient(#d6ccc2 1px, transparent 1px),
                radial-gradient(#d6ccc2 1px, transparent 1px);
            background-size: 40px 40px;
            background-position: 0 0, 20px 20px;
            position: relative;
            min-height: 100vh;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }

        body::-webkit-scrollbar {
            display: none;
        }

        body::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(248, 244, 233, 0.8);
            z-index: -1;
        }

        a,
        a * {
            color: inherit;
            text-decoration: none;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .header-btn {
            padding: 6px 14px;
            background: #8c6d46;
            color: #fff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            font-family: inherit;
            font-size: 0.85rem;
        }

        .header-btn:hover {
            background: #745b3a;
        }

        .header-btn-outline {
            background: transparent;
            border: 1px solid #8c6d46;
            color: #8c6d46;
        }

        .header-btn-outline:hover {
            background: #f1e9dd;
        }

        /* ===== 内容区域 ===== */
        .content-area {
            background: rgba(255, 253, 245, 0.9);
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(92, 76, 62, 0.08);
            padding: 22px 26px;
            border: 1px solid #d6ccc2;
            flex: 1;
        }

        .content-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 2px solid #e9e1d5;
            flex-wrap: wrap;
            gap: 10px;
        }

        .content-title {
            font-family: 'Ma Shan Zheng', cursive;
            font-size: 1.7rem;
            color: #8c3c2c;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .content-title i {
            color: #8c6d46;
            font-size: 1.3rem;
        }

        .content-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        /* ===== 通知统计栏（精致小巧） ===== */
        .notification-stats {
            display: flex;
            gap: 18px;
            align-items: center;
            flex-wrap: wrap;
            padding: 8px 0 14px 0;
            border-bottom: 1px solid #ede4d8;
            margin-bottom: 16px;
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.85rem;
            color: #5c4c3e;
        }

        .stat-item i {
            color: #8c6d46;
            font-size: 0.95rem;
        }

        .stat-count {
            font-weight: 700;
            color: #8c3c2c;
            background: rgba(140, 61, 44, 0.08);
            padding: 1px 10px;
            border-radius: 16px;
            font-size: 0.8rem;
        }

        /* ===== 通知筛选（精致） ===== */
        .notification-filters {
            display: flex;
            gap: 6px;
            margin-bottom: 18px;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 5px 14px;
            background: rgba(255, 255, 255, 0.7);
            border: 1px solid #d6ccc2;
            border-radius: 20px;
            color: #5c4c3e;
            font-family: 'Noto Serif SC', serif;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .filter-btn:hover,
        .filter-btn.active {
            background: #8c6d46;
            color: #fff;
            border-color: #8c6d46;
        }

        /* ===== 通知列表（紧凑精致） ===== */
        .notification-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .notification-item {
            background: rgba(255, 253, 245, 0.9);
            border-radius: 8px;
            padding: 14px 18px;
            border: 1px solid #e9e1d5;
            transition: all 0.25s ease;
            display: flex;
            gap: 14px;
            position: relative;
            box-shadow: 0 1px 4px rgba(92, 76, 62, 0.04);
        }

        .notification-item:hover {
            transform: translateY(-1px);
            box-shadow: 0 3px 10px rgba(92, 76, 62, 0.08);
        }

        .notification-item.unread {
            border-left: 3px solid #8c3c2c;
            background: rgba(255, 253, 245, 0.96);
        }

        .notification-item.important {
            border-left: 3px solid #d4af37;
        }

        .notification-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            flex-shrink: 0;
            margin-top: 2px;
        }

        .notification-icon.system {
            background: rgba(140, 109, 70, 0.12);
            color: #8c6d46;
        }

        .notification-icon.article {
            background: rgba(76, 140, 76, 0.12);
            color: #4c8c4c;
        }

        .notification-icon.user {
            background: rgba(140, 76, 76, 0.12);
            color: #8c4c4c;
        }

        .notification-icon.security {
            background: rgba(140, 61, 44, 0.12);
            color: #8c3c2c;
        }

        .notification-icon.order {
            background: rgba(74, 111, 165, 0.12);
            color: #4a6fa5;
        }

        .notification-icon.course {
            background: rgba(74, 106, 74, 0.12);
            color: #4a7a4a;
        }

        .notification-content {
            flex: 1;
            min-width: 0;
        }

        .notification-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 4px;
            flex-wrap: wrap;
            gap: 4px;
        }

        .notification-title {
            font-weight: 700;
            font-size: 0.95rem;
            color: #4a382a;
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
        }

        .notification-badge {
            background: #8c3c2c;
            color: #fff;
            border-radius: 10px;
            padding: 1px 10px;
            font-size: 0.6rem;
            font-weight: 500;
            letter-spacing: 0.3px;
        }

        .notification-badge.important-badge {
            background: #d4af37;
        }

        .notification-type {
            font-size: 0.65rem;
            color: #9b8a78;
            background: #f1ede6;
            padding: 1px 10px;
            border-radius: 10px;
        }

        .notification-time {
            font-size: 0.7rem;
            color: #9b8a78;
            display: flex;
            align-items: center;
            gap: 3px;
            flex-shrink: 0;
        }

        .notification-message {
            color: #6b5a4b;
            line-height: 1.5;
            font-size: 0.85rem;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .notification-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 6px;
            font-size: 0.75rem;
            color: #9b8a78;
        }

        .notification-sender {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .notification-sender i {
            color: #8c6d46;
            font-size: 0.7rem;
        }

        .notification-actions {
            display: flex;
            gap: 4px;
        }

        .notif-action {
            background: none;
            border: none;
            color: #9b8a78;
            cursor: pointer;
            font-size: 0.7rem;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 3px;
            padding: 2px 8px;
            border-radius: 4px;
            font-family: inherit;
        }

        .notif-action:hover {
            background: rgba(140, 109, 70, 0.08);
            color: #8c6d46;
        }

        .notif-action.read:hover {
            color: #4c8c4c;
        }

        .notif-action.delete:hover {
            color: #8c4c4c;
        }

        .notif-action.important-toggle:hover {
            color: #d4af37;
        }

        /* ===== 空状态 ===== */
        .empty-state {
            text-align: center;
            padding: 40px 20px;
        }

        .empty-state i {
            font-size: 3rem;
            color: #d6ccc2;
            margin-bottom: 12px;
        }

        .empty-state h3 {
            font-family: 'Ma Shan Zheng', cursive;
            font-size: 1.4rem;
            color: #8c6d46;
            margin-bottom: 8px;
        }

        .empty-state p {
            color: #9b8a78;
            font-size: 0.85rem;
        }

        /* ===== 页脚 ===== */
        .main-footer {
            text-align: center;
            padding: 24px 0 10px;
            margin-top: 24px;
            color: #9b8a78;
            font-size: 0.75rem;
            border-top: 1px solid #ede4d8;
        }

        /* ===== 响应式 ===== */
        @media (max-width: 768px) {
            .container {
                padding: 12px;
            }

            .content-area {
                padding: 16px 18px;
            }

            .content-header {
                flex-direction: column;
                align-items: flex-start;
            }

            .notification-item {
                padding: 12px 14px;
                gap: 10px;
            }

            .notification-icon {
                width: 34px;
                height: 34px;
                font-size: 0.9rem;
            }

            .notification-header {
                flex-direction: column;
                align-items: flex-start;
            }

            .notification-footer {
                flex-direction: column;
                align-items: flex-start;
            }

            .notification-actions {
                align-self: flex-end;
            }

            .notification-stats {
                gap: 12px;
            }
        }

        @media (max-width: 480px) {
            .content-title {
                font-size: 1.3rem;
            }

            .header-btn {
                padding: 5px 12px;
                font-size: 0.8rem;
            }

            .filter-btn {
                padding: 4px 10px;
                font-size: 0.7rem;
            }

            .notification-title {
                font-size: 0.85rem;
            }

            .notification-message {
                font-size: 0.78rem;
            }
        }

        /* ===== 装饰字 ===== */
        .decoration {
            position: absolute;
            opacity: 0.07;
            z-index: -1;
            font-family: 'Ma Shan Zheng', cursive;
            color: #8c3c2c;
            pointer-events: none;
            user-select: none;
        }

        .decoration-1 {
            top: 50px;
            left: 2%;
            font-size: 5rem;
            transform: rotate(-10deg);
        }

        .decoration-2 {
            bottom: 80px;
            right: 2%;
            font-size: 4rem;
            transform: rotate(12deg);
        }

        /* ===== Toast ===== */
        .toast-msg {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #5c4c3e;
            color: #fef5e6;
            padding: 10px 22px;
            border-radius: 40px;
            font-size: 0.85rem;
            z-index: 2000;
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.12);
        }

        .toast-msg.show {
            opacity: 1;
        }
    </style>
</head>

<body>
    <div class="decoration decoration-1">通</div>
    <div class="decoration decoration-2">知</div>

    <div class="container">
        <!-- ===== 内容区域 ===== -->
        <main class="content-area">
            <!-- 头部 -->
            <div class="content-header">
                <h2 class="content-title">
                    <i class="fas fa-bell"></i> 通知中心
                </h2>
                <div class="content-actions">
                    <button class="header-btn header-btn-outline" id="markAllReadBtn"
                        style="font-size:0.8rem; padding:5px 14px;">
                        <i class="fas fa-check-double"></i> 全部已读
                    </button>
                    <button class="header-btn header-btn-outline" id="refreshBtn"
                        style="font-size:0.8rem; padding:5px 14px;">
                        <i class="fas fa-sync-alt"></i> 刷新
                    </button>
                </div>
            </div>

            <!-- 统计栏 -->
            <div class="notification-stats">
                <div class="stat-item">
                    <i class="fas fa-bell"></i>
                    <span>全部</span>
                    <span class="stat-count" id="totalCount">0</span>
                </div>
                <div class="stat-item">
                    <i class="fas fa-envelope"></i>
                    <span>未读</span>
                    <span class="stat-count" id="unreadCount">0</span>
                </div>
                <div class="stat-item">
                    <i class="fas fa-exclamation-circle"></i>
                    <span>重要</span>
                    <span class="stat-count" id="importantCount">0</span>
                </div>
            </div>

            <!-- 筛选 -->
            <div class="notification-filters" id="filterContainer">
                <button class="filter-btn active" data-filter="all">全部</button>
                <button class="filter-btn" data-filter="unread">未读</button>
                <button class="filter-btn" data-filter="important">重要</button>
                <button class="filter-btn" data-filter="system">系统</button>
                <button class="filter-btn" data-filter="order">订单</button>
                <button class="filter-btn" data-filter="course">课程</button>
                <button class="filter-btn" data-filter="article">文章</button>
            </div>

            <!-- 通知列表 -->
            <div class="notification-list" id="notifList">
                <!-- 由JS动态渲染 -->
            </div>

            <!-- 空状态 -->
            <div class="empty-state" id="emptyState" style="display:none;">
                <i class="far fa-bell-slash"></i>
                <h3>暂无通知</h3>
                <p>还没有收到任何通知，有新消息时会在这里显示。</p>
            </div>
        </main>

        <!-- ===== 页脚 ===== -->
        <footer class="main-footer">
            <p>© 2026 云间小阁 · 匠坊</p>
        </footer>
    </div>

    <!-- Toast -->
    <div class="toast-msg" id="toastMsg"></div>

    <script>
        // ============================================================
        //  数据层
        // ============================================================
        let notifications = [];
        let currentFilter = 'all';

        const typeIconMap = {
            'system': 'fa-cog',
            'order': 'fa-shopping-bag',
            'course': 'fa-chalkboard-teacher',
            'article': 'fa-file-alt',
            'user': 'fa-users',
            'security': 'fa-shield-alt'
        };

        const typeLabelMap = {
            'system': '系统',
            'order': '订单',
            'course': '课程',
            'article': '文章',
            'user': '用户',
            'security': '安全'
        };

        // ============================================================
        //  工具函数
        // ============================================================
        function showToast(msg, duration = 2200) {
            const el = document.getElementById('toastMsg');
            el.textContent = msg;
            el.classList.add('show');
            clearTimeout(el._timer);
            el._timer = setTimeout(() => el.classList.remove('show'), duration);
        }

        function formatTime(isoStr) {
            const d = new Date(isoStr);
            const now = new Date();
            const diff = (now - d) / 1000;
            if (diff < 60) return '刚刚';
            if (diff < 3600) return Math.floor(diff / 60) + '分钟前';
            if (diff < 86400) return Math.floor(diff / 3600) + '小时前';
            if (diff < 172800) return '昨天';
            if (diff < 259200) return '前天';
            return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
        }

        function getTypeIcon(type) {
            return typeIconMap[type] || 'fa-bell';
        }

        function getTypeLabel(type) {
            return typeLabelMap[type] || type;
        }

        // ============================================================
        //  数据持久化
        // ============================================================
        function loadNotifications() {
            const stored = localStorage.getItem('adminNotifications');
            if (stored) {
                try {
                    notifications = JSON.parse(stored);
                    return;
                } catch (e) { }
            }
            notifications = [{
                id: 'n001',
                title: '系统安全更新提醒',
                content: '检测到系统存在潜在安全风险，请立即安排技术人员进行修复。漏洞详情：用户权限验证模块存在风险。',
                type: 'security',
                time: '2025-06-22T09:30:00',
                read: false,
                important: true,
                sender: '安全团队'
            }, {
                id: 'n002',
                title: '新订单 #ZX20240008',
                content: '用户“林女士”提交了“传世·旗舰包”装修订单，请及时处理。',
                type: 'order',
                time: '2025-06-21T16:45:00',
                read: false,
                important: false,
                sender: '订单系统'
            }, {
                id: 'n003',
                title: '课程审核通过',
                content: '“青瓷拉坯进阶课”已通过审核，现已上线非遗学堂。',
                type: 'course',
                time: '2025-06-21T10:20:00',
                read: true,
                important: false,
                sender: '课程团队'
            }, {
                id: 'n004',
                title: '月度数据报告已生成',
                content: '5月店铺经营数据已汇总，包含销售额、用户增长等核心指标。',
                type: 'system',
                time: '2025-06-01T08:00:00',
                read: true,
                important: false,
                sender: '数据团队'
            }, {
                id: 'n005',
                title: '售后提醒：订单ZX20240005',
                content: '客户“陈先生”对“雅韵·基础包”提出了修改意见，请及时跟进。',
                type: 'order',
                time: '2025-06-20T14:15:00',
                read: false,
                important: false,
                sender: '售后系统'
            }, {
                id: 'n006',
                title: '新文章投稿待审核',
                content: '作者“苏绣传人”提交了新文章《苏绣针法中的文化密码》，请及时审核。',
                type: 'article',
                time: '2025-06-19T11:30:00',
                read: true,
                important: false,
                sender: '内容审核'
            }, {
                id: 'n007',
                title: '数据备份提醒',
                content: '已超过7天未进行完整数据备份，建议立即安排备份操作。',
                type: 'system',
                time: '2025-06-18T17:00:00',
                read: false,
                important: true,
                sender: '数据管理'
            }];
            saveNotifications();
        }

        function saveNotifications() {
            localStorage.setItem('adminNotifications', JSON.stringify(notifications));
        }

        // ============================================================
        //  渲染列表
        // ============================================================
        function renderList() {
            let filtered = notifications;
            if (currentFilter === 'unread') {
                filtered = notifications.filter(n => !n.read);
            } else if (currentFilter === 'important') {
                filtered = notifications.filter(n => n.important);
            } else if (['system', 'order', 'course', 'article', 'user', 'security'].includes(currentFilter)) {
                filtered = notifications.filter(n => n.type === currentFilter);
            }

            filtered.sort((a, b) => new Date(b.time) - new Date(a.time));

            const listEl = document.getElementById('notifList');
            const emptyEl = document.getElementById('emptyState');

            const total = notifications.length;
            const unread = notifications.filter(n => !n.read).length;
            const important = notifications.filter(n => n.important).length;
            document.getElementById('totalCount').textContent = total;
            document.getElementById('unreadCount').textContent = unread;
            document.getElementById('importantCount').textContent = important;

            if (filtered.length === 0) {
                listEl.innerHTML = '';
                emptyEl.style.display = 'block';
                return;
            }
            emptyEl.style.display = 'none';

            let html = '';
            filtered.forEach(n => {
                const unreadClass = !n.read ? 'unread' : '';
                const importantClass = n.important ? 'important' : '';
                const icon = getTypeIcon(n.type);
                const typeLabel = getTypeLabel(n.type);

                html += `
                        <div class="notification-item ${unreadClass} ${importantClass}" data-id="${n.id}">
                            <div class="notification-icon ${n.type}">
                                <i class="fas ${icon}"></i>
                            </div>
                            <div class="notification-content">
                                <div class="notification-header">
                                    <div class="notification-title">
                                        <span>${n.title}</span>
                                        ${!n.read ? `<span class="notification-badge">未读</span>` : ''}
                                        ${n.important ? `<span class="notification-badge important-badge">重要</span>` : ''}
                                        <span class="notification-type">${typeLabel}</span>
                                    </div>
                                    <div class="notification-time">
                                        <i class="far fa-clock"></i> ${formatTime(n.time)}
                                    </div>
                                </div>
                                <div class="notification-message">${n.content}</div>
                                <div class="notification-footer">
                                    <div class="notification-sender">
                                        <i class="fas fa-user-circle"></i> ${n.sender || '系统'}
                                    </div>
                                    <div class="notification-actions">
                                        ${!n.read ? `<button class="notif-action read" data-action="read" data-id="${n.id}"><i class="fas fa-check"></i> 已读</button>` : ''}
                                        <button class="notif-action important-toggle" data-action="toggle-important" data-id="${n.id}">
                                            <i class="fas fa-flag" style="${n.important ? 'color:#d4af37;' : ''}"></i> ${n.important ? '取消重要' : '重要'}
                                        </button>
                                        <button class="notif-action delete" data-action="delete" data-id="${n.id}"><i class="fas fa-trash"></i></button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    `;
            });
            listEl.innerHTML = html;

            document.querySelectorAll('#notifList .notif-action').forEach(btn => {
                btn.addEventListener('click', function (e) {
                    e.stopPropagation();
                    const action = this.dataset.action;
                    const id = this.dataset.id;
                    if (id && action) {
                        handleAction(id, action);
                    }
                });
            });
        }

        // ============================================================
        //  操作处理
        // ============================================================
        function handleAction(id, action) {
            const notif = notifications.find(n => n.id === id);
            if (!notif) {
                showToast('通知不存在');
                return;
            }

            switch (action) {
                case 'read':
                    notif.read = true;
                    saveNotifications();
                    renderList();
                    showToast('已标记为已读');
                    break;
                case 'toggle-important':
                    notif.important = !notif.important;
                    saveNotifications();
                    renderList();
                    showToast(notif.important ? '已标记为重要' : '已取消重要');
                    break;
                case 'delete':
                    if (confirm('确认删除该通知？')) {
                        notifications = notifications.filter(n => n.id !== id);
                        saveNotifications();
                        renderList();
                        showToast('已删除');
                    }
                    break;
            }
        }

        // ============================================================
        //  批量操作
        // ============================================================
        function markAllRead() {
            const unreadList = notifications.filter(n => !n.read);
            if (unreadList.length === 0) {
                showToast('暂无未读通知');
                return;
            }
            if (confirm(`将 ${unreadList.length} 条未读通知全部标记为已读？`)) {
                notifications.forEach(n => { n.read = true; });
                saveNotifications();
                renderList();
                showToast('全部已读');
            }
        }

        // ============================================================
        //  事件绑定
        // ============================================================
        document.getElementById('markAllReadBtn').addEventListener('click', markAllRead);

        document.getElementById('refreshBtn').addEventListener('click', function () {
            const icon = this.querySelector('i');
            icon.classList.add('fa-spin');
            setTimeout(() => {
                loadNotifications();
                renderList();
                icon.classList.remove('fa-spin');
                showToast('已刷新');
            }, 400);
        });

        document.querySelectorAll('#filterContainer .filter-btn').forEach(btn => {
            btn.addEventListener('click', function () {
                document.querySelectorAll('#filterContainer .filter-btn').forEach(b => b.classList.remove(
                    'active'));
                this.classList.add('active');
                currentFilter = this.dataset.filter;
                renderList();
            });
        });

        // ============================================================
        //  初始化
        // ============================================================
        loadNotifications();
        renderList();
    </script>
</body>

</html>
