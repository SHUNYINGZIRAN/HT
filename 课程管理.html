<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>云间小阁 - 课程管理</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@400;700&display=swap"
        rel="stylesheet">
    <style>
        /* ===== 所有样式与商品管理.html完全一致 ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Serif SC', serif;
            background-color: #f8f4e9;
            color: #5c4c3e;
            line-height: 1.6;
            background-image:
                radial-gradient(#d6ccc2 1px, transparent 1px),
                radial-gradient(#d6ccc2 1px, transparent 1px);
            background-size: 40px 40px;
            background-position: 0 0, 20px 20px;
            position: relative;
        }

        body::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(248, 244, 233, 0.8);
            z-index: -1;
        }

        a,
        a * {
            color: inherit;
            text-decoration: none;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* 顶部导航 */
        .main-header {
            background: rgba(255, 253, 245, 0.9);
            padding: 15px 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(92, 76, 62, 0.1);
            margin-bottom: 25px;
            border: 1px solid #d6ccc2;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-family: 'Ma Shan Zheng', cursive;
            font-size: 2.2rem;
            color: #8c3c2c;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .user-role {
            background: #f1e9dd;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.9rem;
            color: #8c6d46;
        }

        .header-actions {
            display: flex;
            gap: 15px;
        }

        .header-btn {
            padding: 8px 15px;
            background: #8c6d46;
            color: #fff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .header-btn:hover {
            background: #745b3a;
        }

        /* 主体内容 */
        .main-content {
            display: flex;
            gap: 25px;
            flex: 1;
        }

        /* 侧边栏 */
        .sidebar {
            width: 250px;
            background: rgba(255, 253, 245, 0.9);
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(92, 76, 62, 0.1);
            padding: 20px;
            border: 1px solid #d6ccc2;
            align-self: flex-start;
        }

        .sidebar-title {
            font-family: 'Ma Shan Zheng', cursive;
            font-size: 1.5rem;
            color: #8c3c2c;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #e9e1d5;
        }

        .nav-list {
            list-style: none;
        }

        .nav-item {
            margin-bottom: 10px;
        }

        .nav-link {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 15px;
            color: #5c4c3e;
            text-decoration: none;
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        .nav-link:hover,
        .nav-link.active {
            background: #f1e9dd;
            color: #8c3c2c;
        }

        .nav-link i {
            width: 20px;
            text-align: center;
        }

        /* 内容区域 */
        .content-area {
            flex: 1;
            background: rgba(255, 253, 245, 0.9);
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(92, 76, 62, 0.1);
            padding: 25px;
            border: 1px solid #d6ccc2;
            min-height: 600px;
        }

        .content-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 2px solid #e9e1d5;
        }

        .content-header:has(.content-actions):not(:has(.content-title)) {
            justify-content: flex-end;
        }

        .content-title {
            font-family: 'Ma Shan Zheng', cursive;
            font-size: 2rem;
            color: #8c3c2c;
        }

        .content-actions {
            display: flex;
            gap: 15px;
        }

        /* 文章表格 */
        .articles-table {
            width: 100%;
            border-collapse: collapse;
        }

        .articles-table th {
            background: #f1e9dd;
            padding: 15px;
            text-align: left;
            color: #8c3c2c;
            font-weight: bold;
        }

        .articles-table td {
            padding: 15px;
            border-bottom: 1px solid #e9e1d5;
        }

        .articles-table tr:hover {
            background: #f9f5eb;
        }

        .article-status {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.85rem;
        }

        .status-draft {
            background: #e8e8d8;
            color: #8c8c4c;
        }

        .status-pending {
            background: #e8e0d8;
            color: #8c6d4c;
        }

        .status-approved {
            background: #d8e8d8;
            color: #4c8c4c;
        }

        .status-rejected {
            background: #e8d8d8;
            color: #8c4c4c;
        }

        .action-btn {
            padding: 6px 12px;
            background: none;
            border: 1px solid #d6ccc2;
            border-radius: 5px;
            color: #5c4c3e;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-right: 5px;
        }

        .action-btn:hover {
            background: #8c6d46;
            color: #fff;
        }

        .action-btn.selected {
            background: #8c6d46;
            color: #fff;
        }

        /* 审核页面特定样式 */
        .review-filters {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.7);
            border: 1px solid #d6ccc2;
            border-radius: 30px;
            color: #5c4c3e;
            font-family: 'Noto Serif SC', serif;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .filter-btn:hover,
        .filter-btn.active {
            background: #8c6d46;
            color: #fff;
        }

        /* 撰写页面特定样式 */
        .editor-container {
            max-width: 800px;
            margin: 0 auto;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #5c4c3e;
        }

        .form-control {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid #d6ccc2;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.7);
            font-family: 'Noto Serif SC', serif;
            font-size: 1rem;
            color: #5c4c3e;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            outline: none;
            border-color: #8c6d46;
            box-shadow: 0 0 0 2px rgba(140, 109, 70, 0.2);
        }

        textarea.form-control {
            min-height: 200px;
            resize: vertical;
        }

        .editor-actions {
            display: flex;
            justify-content: flex-end;
            gap: 15px;
            margin-top: 30px;
        }

        .btn {
            padding: 12px 25px;
            border: none;
            border-radius: 8px;
            font-family: 'Noto Serif SC', serif;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-outline {
            background: transparent;
            border: 1px solid #8c6d46;
            color: #8c6d46;
        }

        .btn-outline:hover {
            background: #f1e9dd;
        }

        .btn-primary {
            background: #8c6d46;
            color: #fff;
        }

        .btn-primary:hover {
            background: #745b3a;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(92, 76, 62, 0.25);
        }

        /* 自定义上传区域 */
        .upload-label-info {
            display: block;
            margin-bottom: 12px;
            font-weight: bold;
            color: #5c4c3e;
        }

        .custom-file-upload {
            position: relative;
            margin-bottom: 20px;
        }

        .custom-file-upload input[type="file"] {
            position: absolute;
            left: 0;
            top: 0;
            opacity: 0;
            width: 100%;
            height: 100%;
            cursor: pointer;
        }

        .file-upload-box {
            border: 2px dashed #d6ccc2;
            border-radius: 8px;
            padding: 30px;
            text-align: center;
            background: rgba(255, 253, 245, 0.7);
            margin-top: 8px;
            transition: all 0.3s ease;
        }

        .file-upload-box:hover {
            border-color: #8c6d46;
            background: rgba(255, 253, 245, 0.9);
        }

        .file-upload-box i {
            font-size: 2.5rem;
            color: #8c6d46;
            margin-bottom: 10px;
        }

        .upload-text {
            display: block;
            font-size: 1.1rem;
            color: #5c4c3e;
            margin-bottom: 5px;
        }

        .upload-hint {
            display: block;
            font-size: 0.9rem;
            color: #8c6d46;
        }

        .file-preview-container {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 15px;
        }

        .file-preview {
            width: 100px;
            height: 100px;
            border-radius: 5px;
            overflow: hidden;
            position: relative;
            border: 1px solid #e9e1d5;
        }

        .file-preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .file-preview .remove-btn {
            position: absolute;
            top: 5px;
            right: 5px;
            background: rgba(0, 0, 0, 0.5);
            color: white;
            border: none;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        /* 上传区域间距 */
        .form-group {
            margin-bottom: 20px;
        }

        /* 视频和音频预览样式 */
        .video-preview-container,
        .audio-preview-container {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin-top: 20px;
            position: relative;
            z-index: 3;
        }

        .video-preview {
            position: relative;
            width: 100%;
            max-width: 400px;
            margin-bottom: 10px;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid #d6ccc2;
            box-shadow: 0 2px 8px rgba(92, 76, 62, 0.1);
        }

        .audio-preview {
            position: relative;
            width: 100%;
            max-width: 400px;
            background: #f1e9dd;
            padding: 10px;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid #d6ccc2;
            box-shadow: 0 2px 8px rgba(92, 76, 62, 0.1);
            margin-bottom: 10px;
            display: flex;
            align-items: center;
        }

        /* 移除按钮样式 */
        .video-preview .remove-file,
        .audio-preview .remove-file {
            position: absolute;
            top: 5px;
            right: 5px;
            width: 20px;
            height: 20px;
            background: rgba(140, 60, 44, 0.8);
            color: #fff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        /* 禁用状态样式 */
        .disabled-upload {
            opacity: 0.6;
            pointer-events: none;
        }

        .disabled-upload .file-upload-box {
            background: rgba(255, 253, 245, 0.5);
            border-color: #e9e1d5;
        }

        .disabled-upload .upload-text,
        .disabled-upload .upload-hint,
        .disabled-upload .upload-label-info {
            color: #b8a99a;
        }

        .disabled-upload i {
            color: #b8a99a !important;
        }

        /* 禁用文本样式 */
        .disabled-text {
            color: #b8a99a !important;
            opacity: 0.6;
        }

        /* 页脚 */
        .main-footer {
            text-align: center;
            padding: 30px 0;
            margin-top: 40px;
            color: #8c6d46;
            font-size: 0.9rem;
        }

        /* 响应式设计 */
        @media (max-width: 992px) {
            .main-content {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
            }
        }

        @media (max-width: 768px) {
            .main-header {
                flex-direction: column;
                gap: 15px;
            }

            .user-info {
                flex-direction: column;
                gap: 10px;
            }

            .content-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 15px;
            }

            .articles-table {
                display: block;
                overflow-x: auto;
            }
        }

        .decoration {
            position: absolute;
            opacity: 0.1;
            z-index: -1;
            font-family: 'Ma Shan Zheng', cursive;
            color: #8c3c2c;
        }

        .decoration-1 {
            top: 50px;
            left: 5%;
            font-size: 6rem;
            transform: rotate(-10deg);
        }

        .decoration-2 {
            bottom: 100px;
            right: 5%;
            font-size: 5rem;
            transform: rotate(15deg);
        }

        /* 模态窗口样式 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: #f8f4e9;
            border-radius: 12px;
            padding: 30px;
            width: 90%;
            max-width: 600px;
            box-shadow: 0 5px 25px rgba(0, 0, 0, 0.2);
            position: relative;
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal-close {
            position: absolute;
            top: 15px;
            right: 15px;
            font-size: 1.5rem;
            color: #8c6d46;
            cursor: pointer;
        }

        .modal-title {
            font-family: 'Ma Shan Zheng', cursive;
            font-size: 1.8rem;
            color: #8c3c2c;
            margin-bottom: 20px;
            text-align: center;
        }

        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
        }

        .empty-state i {
            font-size: 4rem;
            color: #d6ccc2;
            margin-bottom: 20px;
        }

        .empty-state h3 {
            font-family: 'Ma Shan Zheng', cursive;
            font-size: 1.8rem;
            color: #8c6d46;
            margin-bottom: 15px;
        }

        .empty-state p {
            color: #5c4c3e;
            max-width: 500px;
            margin: 0 auto 30px;
        }

        /* 数据统计页面样式 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: #f9f5eb;
            border-radius: 12px;
            padding: 25px;
            border: 1px solid #e9e1d5;
            text-align: center;
            box-shadow: 0 2px 10px rgba(92, 76, 62, 0.1);
            transition: all 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(92, 76, 62, 0.15);
        }

        .stat-icon {
            font-size: 2.5rem;
            color: #8c6d46;
            margin-bottom: 15px;
        }

        .stat-value {
            font-size: 2.2rem;
            font-weight: bold;
            color: #8c3c2c;
            margin-bottom: 5px;
        }

        .stat-label {
            color: #5c4c3e;
            font-size: 1rem;
        }

        .charts-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 25px;
            margin-top: 30px;
        }

        .chart-card {
            background: #f9f5eb;
            border-radius: 12px;
            padding: 25px;
            border: 1px solid #e9e1d5;
            box-shadow: 0 2px 10px rgba(92, 76, 62, 0.1);
        }

        .chart-title {
            font-family: 'Ma Shan Zheng', cursive;
            font-size: 1.3rem;
            color: #8c3c2c;
            margin-bottom: 15px;
            text-align: center;
        }

        .chart-placeholder {
            height: 250px;
            background: rgba(255, 253, 245, 0.7);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #8c6d46;
            font-size: 1.1rem;
            border: 1px dashed #d6ccc2;
        }

        /* 用户管理页面样式 */
        .user-filters {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .user-search {
            position: relative;
            flex: 1;
            min-width: 250px;
        }

        .user-search input {
            width: 100%;
            padding: 12px 20px 12px 45px;
            border: 1px solid #d6ccc2;
            border-radius: 30px;
            background: rgba(255, 253, 245, 0.9);
            font-family: 'Noto Serif SC', serif;
            font-size: 1rem;
            color: #5c4c3e;
            box-shadow: 0 2px 8px rgba(92, 76, 62, 0.1);
        }

        .user-search i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #8c6d46;
        }

        .user-role-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 15px;
            font-size: 0.8rem;
            font-weight: bold;
        }

        .role-admin {
            background: #f1e9dd;
            color: #8c6d46;
        }

        .role-editor {
            background: #e8e0d8;
            color: #8c6d4c;
        }

        .role-user {
            background: #d8e8d8;
            color: #4c8c4c;
        }

        .user-status {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 15px;
            font-size: 0.8rem;
        }

        .status-active {
            background: #d8e8d8;
            color: #4c8c4c;
        }

        .status-inactive {
            background: #e8d8d8;
            color: #8c4c4c;
        }

        /* 分类管理页面样式 */
        .category-toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .category-tree {
            background: #f9f5eb;
            border-radius: 12px;
            padding: 20px;
            border: 1px solid #e9e1d5;
            max-height: 500px;
            overflow-y: auto;
        }

        .category-item {
            padding: 10px 15px;
            margin-bottom: 8px;
            background: rgba(255, 253, 245, 0.7);
            border-radius: 8px;
            border: 1px solid #e9e1d5;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .category-item:hover {
            background: rgba(255, 253, 245, 0.9);
        }

        .category-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .category-icon {
            color: #8c6d46;
            font-size: 1.2rem;
        }

        .category-name {
            font-weight: bold;
            color: #5c4c3e;
        }

        .category-count {
            background: #e9e1d5;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 0.8rem;
            color: #8c6d46;
        }

        .category-actions {
            display: flex;
            gap: 8px;
        }

        .category-form {
            background: #f9f5eb;
            border-radius: 12px;
            padding: 25px;
            border: 1px solid #e9e1d5;
            margin-top: 25px;
        }

        .form-row {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
        }

        .form-row .form-group {
            flex: 1;
            margin-bottom: 0;
        }

        /* 商品管理特定样式 */
        .product-status {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.85rem;
        }

        .status-onsale {
            background: #d8e8d8;
            color: #4c8c4c;
        }

        .status-soldout {
            background: #e8e0d8;
            color: #8c6d4c;
        }

        .status-offline {
            background: #e8d8d8;
            color: #8c4c4c;
        }

        .product-params {
            margin-top: 20px;
        }

        .param-row {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }

        .param-name {
            flex: 1;
        }

        .param-value {
            flex: 2;
        }

        .add-param-btn {
            background: #f1e9dd;
            border: 1px dashed #d6ccc2;
            padding: 10px;
            border-radius: 8px;
            color: #8c6d46;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
            margin-top: 10px;
        }

        .add-param-btn:hover {
            background: #e9e1d5;
            border-color: #8c6d46;
        }

        .remove-param-btn {
            background: #e8d8d8;
            border: none;
            border-radius: 50%;
            width: 25px;
            height: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: #8c4c4c;
        }

        /* ===== 课程管理专用样式（仅内容区域使用） ===== */
        .course-status {

    <script>
        // ============================================================
        //  数据层
        // ============================================================
        let courses = [];
        let editingId = null;
        let currentFilter = 'all';

        // DOM 引用
        const tbody = document.getElementById('courseTableBody');
        const emptyState = document.getElementById('emptyState');
        const editor = document.getElementById('courseEditor');
        const editorTitle = document.getElementById('editorTitle');
        const courseTitle = document.getElementById('courseTitle');
        const courseTeacher = document.getElementById('courseTeacher');
        const courseCover = document.getElementById('courseCover');
        const courseStatus = document.getElementById('courseStatus');
        const courseDesc = document.getElementById('courseDesc');
        const courseVideo = document.getElementById('courseVideo');
        const chapterListEditor = document.getElementById('chapterListEditor');
        const newChapterTitle = document.getElementById('newChapterTitle');
        const newChapterVideo = document.getElementById('newChapterVideo');

        const addCourseBtn = document.getElementById('addCourseBtn');
        const saveCourseBtn = document.getElementById('saveCourseBtn');
        const cancelEditBtn = document.getElementById('cancelEditBtn');
        const addChapterBtn = document.getElementById('addChapterBtn');
        const exportBtn = document.getElementById('exportBtn');
        const filterBtn = document.getElementById('filterBtn');
        const filterBtns = document.querySelectorAll('.filter-btn');

        // ============================================================
        //  工具函数
        // ============================================================
        function showToast(msg, duration = 2200) {
            const el = document.getElementById('toastMsg');
            el.textContent = msg;
            el.classList.add('show');
            clearTimeout(el._timer);
            el._timer = setTimeout(() => el.classList.remove('show'), duration);
        }

        function getStatusLabel(status) {
            const map = { 'published': '已发布', 'draft': '草稿', 'archived': '已归档' };
            return map[status] || status;
        }

        function getStatusCls(status) {
            const map = { 'published': 'status-published', 'draft': 'status-draft', 'archived': 'status-archived' };
            return map[status] || '';
        }

        // ============================================================
        //  数据持久化
        // ============================================================
        function loadCourses() {
            const stored = localStorage.getItem('courseManageData');
            if (stored) {
                try {
                    courses = JSON.parse(stored);
                    return;
                } catch (e) { }
            }
            courses = [{
                id: 'c001',
                title: '苏绣基础针法',
                teacher: '王秀英',
                cover: 'https://picsum.photos/id/30/400/225',
                desc: '苏绣基础针法，从零开始学习平针与滚针。',
                video: 'https://storage.googleapis.com/gtv-videos-bucket/sample/ForBiggerBlazes.mp4',
                status: 'published',
                chapters: [
                    { title: '工具介绍与劈丝', video: 'https://storage.googleapis.com/gtv-videos-bucket/sample/ForBiggerBlazes.mp4' },
                    { title: '起针与平针绣', video: 'https://storage.googleapis.com/gtv-videos-bucket/sample/ForBiggerBlazes.mp4' },
                    { title: '滚针与接针', video: 'https://storage.googleapis.com/gtv-videos-bucket/sample/ForBiggerBlazes.mp4' }
                ],
                students: 23000,
                createTime: '2025-03-01T10:00:00'
            }, {
                id: 'c002',
                title: '青瓷拉坯技艺',
                teacher: '陈建平',
                cover: 'https://picsum.photos/id/42/400/225',
                desc: '龙泉青瓷拉坯基础，从揉泥到成型。',
                video: 'https://storage.googleapis.com/gtv-videos-bucket/sample/TearsOfSteel.mp4',
                status: 'draft',
                chapters: [
                    { title: '揉泥与定位', video: 'https://storage.googleapis.com/gtv-videos-bucket/sample/TearsOfSteel.mp4' },
                    { title: '定中心与开口', video: 'https://storage.googleapis.com/gtv-videos-bucket/sample/TearsOfSteel.mp4' }
                ],
                students: 0,
                createTime: '2025-03-10T14:30:00'
            }];
            saveCourses();
        }

        function saveCourses() {
            localStorage.setItem('courseManageData', JSON.stringify(courses));
        }

        // ============================================================
        //  渲染列表
        // ============================================================
        function renderList() {
            let filtered = courses;
            if (currentFilter !== 'all') {
                filtered = courses.filter(c => c.status === currentFilter);
            }

            if (filtered.length === 0) {
                tbody.innerHTML = '';
                emptyState.style.display = 'block';
                return;
            }
            emptyState.style.display = 'none';

            let html = '';
            filtered.forEach(c => {
                html += `
                        <tr>
                            <td><strong>${c.title}</strong></td>
                            <td>${c.teacher}</td>
                            <td>${c.chapters ? c.chapters.length : 0}</td>
                            <td>${c.students || 0}</td>
                            <td><span class="course-status ${getStatusCls(c.status)}">${getStatusLabel(c.status)}</span></td>
                            <td>
                                <button class="action-btn edit" data-id="${c.id}"><i class="fas fa-edit"></i> 编辑</button>
                                <button class="action-btn delete" data-id="${c.id}"><i class="fas fa-trash"></i> 删除</button>
                            </td>
                        </tr>
                    `;
            });
            tbody.innerHTML = html;

            document.querySelectorAll('.action-btn.edit').forEach(btn => {
                btn.addEventListener('click', function () {
                    const id = this.dataset.id;
                    openEditor(id);
                });
            });
            document.querySelectorAll('.action-btn.delete').forEach(btn => {
                btn.addEventListener('click', function () {
                    const id = this.dataset.id;
                    if (confirm('确认删除该课程吗？')) {
                        courses = courses.filter(c => c.id !== id);
                        saveCourses();
                        renderList();
                        if (editingId === id) closeEditor();
                        showToast('已删除课程');
                    }
                });
            });
        }

        // ============================================================
        //  编辑器
        // ============================================================
        function openEditor(courseId = null) {
            editor.classList.add('visible');
            if (courseId) {
                const course = courses.find(c => c.id === courseId);
                if (!course) return;
                editingId = courseId;
                editorTitle.innerHTML = `<i class="fas fa-pen-fancy"></i> 编辑课程`;
                courseTitle.value = course.title || '';
                courseTeacher.value = course.teacher || '';
                courseCover.value = course.cover || '';
                courseStatus.value = course.status || 'draft';
                courseDesc.value = course.desc || '';
                courseVideo.value = course.video || '';
                renderChapters(course.chapters || []);
            } else {
                editingId = null;
                editorTitle.innerHTML = `<i class="fas fa-pen-fancy"></i> 新增课程`;
                courseTitle.value = '';
                courseTeacher.value = '';
                courseCover.value = '';
                courseStatus.value = 'draft';
                courseDesc.value = '';
                courseVideo.value = '';
                renderChapters([]);
            }
            editor.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }

        function closeEditor() {
            editor.classList.remove('visible');
            editingId = null;
        }

        function renderChapters(chapters) {
            if (!chapters || chapters.length === 0) {
                chapterListEditor.innerHTML = '<div style="color:#9b8a78; padding:12px; text-align:center;">暂无章节，请添加</div>';
                return;
            }
            let html = '';
            chapters.forEach((ch, index) => {
                const videoDisplay = ch.video ? `<i class="fas fa-video"></i> ${ch.video.length > 30 ? ch.video.substring(0, 30) + '...' : ch.video}` : '<i class="fas fa-exclamation-triangle" style="color:#b08070;"></i> 未设置';
                html += `
                        <div class="chapter-item-editor">
                            <span class="ch-order">${index + 1}</span>
                            <span class="ch-title">${ch.title}</span>
                            <span class="ch-video" title="${ch.video || ''}">${videoDisplay}</span>
                            <div class="ch-actions">
                                <button class="ch-edit" data-index="${index}"><i class="fas fa-edit"></i></button>
                                <button class="ch-delete" data-index="${index}"><i class="fas fa-trash-alt"></i></button>
                            </div>
                        </div>
                    `;
            });
            chapterListEditor.innerHTML = html;

            document.querySelectorAll('.ch-delete').forEach(btn => {
                btn.addEventListener('click', function () {
                    const idx = parseInt(this.dataset.index);
                    const course = getEditingCourse();
                    if (course && course.chapters) {
                        course.chapters.splice(idx, 1);
                        renderChapters(course.chapters);
                        showToast('已删除章节');
                    }
                });
            });
            document.querySelectorAll('.ch-edit').forEach(btn => {
                btn.addEventListener('click', function () {
                    const idx = parseInt(this.dataset.index);
                    const course = getEditingCourse();
                    if (course && course.chapters) {
                        const ch = course.chapters[idx];
                        const newTitle = prompt('修改章节标题', ch.title);
                        if (newTitle !== null && newTitle.trim() !== '') {
                            ch.title = newTitle.trim();
                            const newVideo = prompt('修改视频链接', ch.video || '');
                            if (newVideo !== null) ch.video = newVideo.trim();
                            renderChapters(course.chapters);
                            showToast('已更新章节');
                        }
                    }
                });
            });
        }

        function getEditingCourse() {
            if (editingId) {
                return courses.find(c => c.id === editingId);
            } else {
                if (!window._tempNewCourse) {
                    window._tempNewCourse = { chapters: [] };
                }
                return window._tempNewCourse;
            }
        }

        function addChapter() {
            const title = newChapterTitle.value.trim();
            const video = newChapterVideo.value.trim();
            if (!title) {
                showToast('请输入章节标题');
                return;
            }
            const course = getEditingCourse();
            if (course) {
                if (!course.chapters) course.chapters = [];
                course.chapters.push({ title, video });
                renderChapters(course.chapters);
                newChapterTitle.value = '';
                newChapterVideo.value = '';
                showToast('已添加章节');
            }
        }

        function saveCourse() {
            const title = courseTitle.value.trim();
            const teacher = courseTeacher.value.trim();
            if (!title || !teacher) {
                showToast('请填写课程名称和讲师');
                return;
            }

            let chapters = [];
            if (editingId) {
                const exist = courses.find(c => c.id === editingId);
                if (exist) chapters = exist.chapters || [];
            } else {
                if (window._tempNewCourse) chapters = window._tempNewCourse.chapters || [];
            }

            if (editingId) {
                const index = courses.findIndex(c => c.id === editingId);
                if (index !== -1) {
                    courses[index].title = title;
                    courses[index].teacher = teacher;
                    courses[index].cover = courseCover.value.trim();
                    courses[index].status = courseStatus.value;
                    courses[index].desc = courseDesc.value.trim();
                    courses[index].video = courseVideo.value.trim();
                    courses[index].chapters = chapters;
                    saveCourses();
                    renderList();
                    closeEditor();
                    showToast('课程已更新');
                }
            } else {
                const newCourse = {
                    id: 'c' + Date.now(),
                    title,
                    teacher,
                    cover: courseCover.value.trim(),
                    desc: courseDesc.value.trim(),
                    video: courseVideo.value.trim(),
                    status: courseStatus.value,
                    chapters: chapters || [],
                    students: 0,
                    createTime: new Date().toISOString()
                };
                courses.push(newCourse);
                saveCourses();
                renderList();
                closeEditor();
                window._tempNewCourse = null;
                showToast('课程已创建');
            }
        }

        // ============================================================
        //  事件绑定
        // ============================================================
        addCourseBtn.addEventListener('click', () => {
            window._tempNewCourse = { chapters: [] };
            openEditor(null);
        });

        cancelEditBtn.addEventListener('click', () => {
            if (confirm('取消编辑将丢失未保存的更改，确认？')) {
                closeEditor();
                window._tempNewCourse = null;
            }
        });

        saveCourseBtn.addEventListener('click', saveCourse);
        addChapterBtn.addEventListener('click', addChapter);

        exportBtn.addEventListener('click', () => {
            showToast('📥 导出课程数据（模拟）');
        });

        filterBtn.addEventListener('click', () => {
            showToast('🔍 点击上方状态按钮即可筛选');
        });

        filterBtns.forEach(btn => {
            btn.addEventListener('click', function () {
                filterBtns.forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                currentFilter = this.dataset.filter;
                renderList();
                if (editingId) {
                    const filtered = courses.filter(c => {
                        if (currentFilter === 'all') return true;
                        return c.status === currentFilter;
                    });
                    if (!filtered.some(c => c.id === editingId)) {
                        closeEditor();
                    }
                }
            });
        });

        // ============================================================
        //  初始化
        // ============================================================
        loadCourses();
        renderList();
        editor.classList.remove('visible');

        newChapterTitle.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                addChapter();
            }
        });
        newChapterVideo.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                addChapter();
            }
        });
    </script>
</body>

</html>
